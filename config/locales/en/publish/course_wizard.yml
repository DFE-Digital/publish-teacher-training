en:
  course_wizard:
    show:
      cancel: Cancel
    steps:
      level:
        heading: What type of course?
        level_label: Subject level
        send_label: Does this course have a special educational needs and disability (SEND) specialism?
        submit: Continue
        cancel: Cancel
        options:
          primary: Primary
          secondary: Secondary
          further_education: Further education
          further_education_value: further_education
          yes_send: "Yes"
          no_send: "No"
        errors:
          level:
            blank: Select a subject level
          is_send:
            blank: Select if this course has a special educational needs and disability (SEND) specialism
      primary_subjects:
        caption: Add course
        heading: Subject
        submit: Continue
        errors:
          primary_master_subject_id:
            blank: Select a subject
      secondary_subjects:
        caption: Add course
        heading: Subject
        bursary_and_scholarship_text: Candidates may be able to get a bursary or scholarship for some subjects.If the course content is made up of at least 50% of a subject that is eligible for a bursary, add this as the first subject. This means we can show the correct financial information to candidates.
        bursary_and_scholarship_link_text: Learn more about the bursaries and scholarships
        bursary_and_scholarship_link_url: https://www.gov.uk/government/publications/funding-initial-teacher-training-itt/funding-initial-teacher-training-itt-academic-year-2023-to-2024#postgraduate-bursaries-and-scholarships
        first_subject_label: First subject
        second_subject_label: Second subject (optional)
        submit: Continue
        errors:
          secondary_master_subject_id:
            blank: Select a subject
            same_as_subordinate_subject_id: The second subject must be different to the first subject
      age_range:
        caption: Add course
        heading: Age range
        other_hint: "Enter an age range in years, for example: 5 to 11. The course must cover 4 or more school years."
        other_from_label: From
        other_to_label: To
        submit: Continue
        errors:
          age_range_in_years:
            blank: Select an age range
      qualifications:
        caption: Add course
        heading: Qualification
        submit: Continue
        options:
          qts:
            label: QTS
            help: Qualified teacher status
          pgce:
            label: PGCE only (without QTS)
            help: Postgraduate certificate in education
          pgce_with_qts:
            label: QTS with PGCE
            help: Qualified teacher status with a postgraduate certificate in education
          pgde:
            label: PGDE only (without QTS)
            help: Postgraduate diploma in education
          pgde_with_qts:
            label: QTS with PGDE
            help: Qualified teacher status with a postgraduate diploma in education
          undergraduate_degree_with_qts:
            label: Teacher degree apprenticeship (TDA) with QTS
            help: Teacher degree apprenticeship with qualified teacher status
        errors:
          qualification:
            blank: Select a qualification
      funding_type:
        caption: Add course
        heading: Funding type
        submit: Continue
        options:
          fee:
            label: Fee - no salary
          salary:
            label: Salary
          apprenticeship:
            label: Teaching apprenticeship - with salary
        errors:
          funding_type:
            blank: Select a funding type
      study_pattern:
        caption: Add course
        heading: Study pattern
        hint: Select all that apply
        submit: Continue
        options:
          full_time:
            label: Full time
          part_time:
            label: Part time
        errors:
          study_pattern:
            blank: Select a study pattern
      schools:
        caption: Add course
        hint: Select all that apply
        submit: Continue
        description: The more schools you select, the more searches your course will appear in. You should only add schools that are relevant to this course.
        percentage: 60% of searches are by location.
        errors:
          site_ids:
            blank: Select at least one school
      study_sites:
        caption: Add course
        heading: Study sites
        submit: Continue
        hint: Select all that apply
      accredited_provider:
        caption: Add course
        heading: Accredited provider
        submit: Continue
        errors:
          accredited_provider_code:
            blank: Select an accredited provider
      start_date:
        caption: Add course
        heading: Course start date
        submit: Continue
        errors:
          start_date:
            blank: Select a course start date
      visa_sponsorship:
        caption: Add course
        heading: Student visas
        submit: Continue
        questions:
          organisation: Can your organisation sponsor Student visas for this course?
          availability: Is Student visa sponsorship available for this course?
        recruiting_from_overseas:
          prefix: Learn more about
          link_text: recruiting trainee teachers from overseas
          link_url: https://www.gov.uk/guidance/recruit-trainee-teachers-from-overseas-accredited-itt-providers
        inset:
          can_sponsor: "%{provider_name} can sponsor Student visas for some of their courses."
          cannot_sponsor: "%{provider_name} have said they cannot sponsor Student visas so we have defaulted your answer to 'No'."
          contact_provider: "If your organisation would like to sponsor Student visas, contact %{provider_name}."
        options:
          can_sponsor_student_visa:
            label: "Yes"
          cannot_sponsor_student_visa:
            label: "No"
        errors:
          can_sponsor_student_visa:
            blank: Select if student visas can be sponsored for this course
