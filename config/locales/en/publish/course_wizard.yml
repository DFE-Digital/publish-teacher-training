en:
  course_wizard:
    show:
      cancel: Cancel
    steps:
      level:
        heading: What type of course?
        level_label: Subject level
        send_label: Does this course have a special educational needs and disability (SEND) specialism?
        submit: Continue
        cancel: Cancel
        options:
          primary: Primary
          secondary: Secondary
          further_education: Further education
          further_education_value: further_education
          yes_send: "Yes"
          no_send: "No"
        errors:
          level:
            blank: Select a subject level
          is_send:
            blank: Select if this course has a special educational needs and disability (SEND) specialism
      primary_subjects:
        caption: Add course
        heading: Subject
        submit: Continue
        errors:
          primary_master_subject_id:
            blank: Select a subject
      secondary_subjects:
        caption: Add course
        heading: Subject
        bursary_and_scholarship_text: Candidates may be able to get a bursary or scholarship for some subjects.If the course content is made up of at least 50% of a subject that is eligible for a bursary, add this as the first subject. This means we can show the correct financial information to candidates.
        bursary_and_scholarship_link_text: Learn more about the bursaries and scholarships
        bursary_and_scholarship_link_url: https://www.gov.uk/government/publications/funding-initial-teacher-training-itt/funding-initial-teacher-training-itt-academic-year-2023-to-2024#postgraduate-bursaries-and-scholarships
        first_subject_label: First subject
        second_subject_label: Second subject (optional)
        submit: Continue
        errors:
          secondary_master_subject_id:
            blank: Select a subject
            same_as_subordinate_subject_id: The second subject must be different to the first subject
      age_range:
        caption: Add course
        heading: Age range
        other_hint: "Enter an age range in years, for example: 5 to 11. The course must cover 4 or more school years."
        other_from_label: From
        other_to_label: To
        submit: Continue
        errors:
          age_range_in_years:
            blank: Select an age range
      qualifications:
        caption: Add course
        heading: Qualification
        submit: Continue
        options:
          qts:
            label: QTS
            help: Qualified teacher status
          pgce:
            label: PGCE only (without QTS)
            help: Postgraduate certificate in education
          pgce_with_qts:
            label: QTS with PGCE
            help: Qualified teacher status with a postgraduate certificate in education
          pgde:
            label: PGDE only (without QTS)
            help: Postgraduate diploma in education
          pgde_with_qts:
            label: QTS with PGDE
            help: Qualified teacher status with a postgraduate diploma in education
          undergraduate_degree_with_qts:
            label: Teacher degree apprenticeship (TDA) with QTS
            help: Teacher degree apprenticeship with qualified teacher status
        errors:
          qualification:
            blank: Select a qualification
      funding_type:
        caption: Add course
        heading: Funding type
        submit: Continue
        options:
          fee:
            label: Fee - no salary
          salary:
            label: Salary
          apprenticeship:
            label: Teaching apprenticeship - with salary
        errors:
          funding_type:
            blank: Select a funding type
      study_pattern:
        caption: Add course
        heading: Study pattern
        hint: Select all that apply
        submit: Continue
        options:
          full_time:
            label: Full time
          part_time:
            label: Part time
        errors:
          study_pattern:
            blank: Select a study pattern
      schools:
        caption: Add course
        hint: Select all that apply
        submit: Continue
        description: The more schools you select, the more searches your course will appear in. You should only add schools that are relevant to this course.
        percentage: 60% of searches are by location.
        errors:
          site_ids:
            blank: Select at least one school
      study_sites:
        caption: Add course
        heading: Study sites
        submit: Continue
        hint: Select all that apply
      accredited_provider:
        caption: Add course
        heading: Accredited provider
        submit: Continue
        errors:
          accredited_provider_code:
            blank: Select an accredited provider
      start_date:
        caption: Add course
        heading: Course start date
        submit: Continue
        errors:
          start_date:
            blank: Select a course start date
      check_answers:
        caption: Add course
        heading: Check your answers
        submit: Create course
        change: Change
        answers:
          "yes": "Yes"
          "no": "No"
        labels:
          level: Subject level
          send: Special educational needs and disability (SEND)
          primary_subject: Subject
          first_subject: First subject
          second_subject: Second subject
          age_range: Age range
          qualification: Qualification
          funding_type: Funding type
          study_pattern: Study pattern
          schools: Schools
          study_sites: Study sites
          accredited_provider: Accredited provider
          student_visa_sponsorship: Student visa sponsorship
          skilled_worker_visa_sponsorship: Skilled Worker visa sponsorship
          visa_sponsorship_application_deadline_required: Deadline for applications that require visa sponsorship
          visa_sponsorship_application_deadline_at: Deadline date for applications that require visa sponsorship
          start_date: Course start date
      visa_sponsorship:
        caption: Add course
        heading: Student visas
        submit: Continue
        questions:
          organisation: Can your organisation sponsor Student visas for this course?
          availability: Is Student visa sponsorship available for this course?
        recruiting_from_overseas:
          prefix: Learn more about
          link_text: recruiting trainee teachers from overseas
          link_url: https://www.gov.uk/guidance/recruit-trainee-teachers-from-overseas-accredited-itt-providers
        inset:
          can_sponsor: "%{provider_name} can sponsor Student visas for some of their courses."
          cannot_sponsor: "%{provider_name} have said they cannot sponsor Student visas so we have defaulted your answer to 'No'."
          contact_provider: "If your organisation would like to sponsor Student visas, contact %{provider_name}."
        options:
          can_sponsor_student_visa:
            label: "Yes"
          cannot_sponsor_student_visa:
            label: "No"
        errors:
          can_sponsor_student_visa:
            blank: Select if student visas can be sponsored for this course
      skilled_worker_visa:
        caption: Add course
        heading: Skilled Worker visas
        question: Can your organisation sponsor Skilled Worker visas for this course?
        submit: Continue
        options:
          can_sponsor_skilled_worker_visa:
            label: "Yes"
          cannot_sponsor_skilled_worker_visa:
            label: "No"
        errors:
          can_sponsor_skilled_worker_visa:
            blank: Select if candidates can get a sponsored Skilled Worker visa
      visa_sponsorship_application_deadline_required:
        caption: Add course
        heading: Is there a deadline for applications that require visa sponsorship?
        question: Is there a deadline for applications that require visa sponsorship?
        hint: You have told us that you can sponsor visas for this course.
        submit: Continue
        options:
          visa_sponsorship_application_deadline_required:
            label: "Yes"
          visa_sponsorship_application_deadline_not_required:
            label: "No"
        errors:
          visa_sponsorship_application_deadline_required:
            blank: Select if there is a deadline for applications that require visa sponsorship
      visa_sponsorship_application_deadline_at:
        caption: Add course
        heading: Date that applications close for visa sponsored candidates
        legend: What date will applications that require visa sponsorship close?
        deadline_advice:
          it_takes_around_90_days: It takes around 90 days between a candidate that needs visa sponsorship accepting an offer and being recruited.
          choose_a_deadline_date: Choose a deadline date that gives you at least 3 months to process applications that require a visa so that candidates can start the course on time
          if_you_need_more_time: If you need more time to process these applications, set an earlier date.
        hint:
          hint_date: For example 31 3 2024
          hint_time: Applications will close at 11:59pm on the date you enter
        submit: Continue
  activemodel:
    errors:
      models:
        course_wizard/steps/age_range:
          attributes:
            course_age_range_in_years_other_from:
              blank: Enter an age in From
              not_a_number: Enter a valid age in From
              not_an_integer: Enter a valid age in From
              greater_than_or_equal_to: From age must be between 3 and 15
              less_than_or_equal_to: From age must be between 3 and 15
              invalid: Enter a valid age in From
            course_age_range_in_years_other_to:
              blank: Enter an age in To
              not_a_number: Enter a valid age in To
              not_an_integer: Enter a valid age in To
              greater_than_or_equal_to: To age must be between 7 and 19
              less_than_or_equal_to: To age must be between 7 and 19
              invalid: Enter a valid age in To
        course_wizard/steps/visa_sponsorship_application_deadline_at:
          attributes:
            visa_sponsorship_application_deadline_at:
              all_blank: Select a date that applications close for visa sponsored candidates
              some_blank: The date that applications which require visa sponsorship will close must contain a day, a month and a year
              not_integers: The date that applications which require visa sponsorship will close can only contain numbers 0 to 9
              invalid_date: Enter a real date that applications close for visa sponsored candidates
              not_in_range: >
                The date that applications which require visa sponsorship will close must be between %{earliest_date} and
                the end of the recruitment cycle, %{apply_deadline}
