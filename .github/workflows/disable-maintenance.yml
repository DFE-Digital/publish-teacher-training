name: Disable maintenance

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options:
        - qa
        - production
        - sandbox
        - staging
      confirm_production:
        description: Confirm production deployment
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  packages: write

jobs:
  disable-maintenance:
    name: Disable maintenance app
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - uses: azure/login@v3
      with:
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        client-id: ${{ secrets.AZURE_CLIENT_ID }}

    - name: Set ARM and kubelogin environment
      uses: DFE-Digital/github-actions/set-kubelogin-environment@master
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}

    - name: Confirm production
      if: ${{ inputs.environment == 'production' && !inputs.confirm_production }}
      run: |
        echo "Production maintenance requires confirm_production to be selected."
        exit 1
  
    - name: Disable maintenance app
      run: make ${{ inputs.environment }} disable-maintenance
      env:
        CONFIRM_PRODUCTION: ${{ inputs.confirm_production && 'yes' || '' }}
